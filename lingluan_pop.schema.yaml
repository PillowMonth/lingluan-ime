# Rime schema settings
# encoding: utf-8

__include: lingluan.schema:/

schema:
  schema_id: lingluan_pop
  name: 靈亂·頂真
  version: 乙巳冬至
  author:
    - 作者 朱宇浩
    - 官方網站 <https://shurufa.app>
    - 官方QQ群 735728797
  description: |
    靈亂輸入法之延時頂屏版,候選項唯一時不自動上屏,需要下一擊頂出候選項.
  dependencies:
    - yuhao_pinyin
    - lingluan_chaifen
    - lingluan_chaifen_tw

speller/+:
  auto_select: false  # 自動選擇唯一候選項(true)或否(false)

key_binder/+:
  bindings/+:
    - { when: always, accept: "Control+Shift+N", select: lingluan_fluency } # 切換靈亂語流版
    - { when: always, accept: "Control+Shift+B", select: lingluan } # 切換靈亂標準版