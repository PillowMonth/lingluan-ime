---
name: "lingluan_complete"
version: "20260619"
sort: original
import_tables:
  # 以下是簡碼字詞，空格上屏
  - yuhao/lingluan.quick
  # 以下是簡碼字詞，韻碼上屏
  - yuhao/lingluan.pop
  # 以下是單字全碼，包括陸標、臺標、港標、兼容拆分
  - yuhao/lingluan.full
  # 以下是高優先級用户自定义詞庫
  - yuhao/yuhao.private
  # 以下是字根提示
  - yuhao/lingluan.roots
  # 以下是宇浩極簡千詞詞庫
  - yuhao/lingluan_sc.words_essence
  - yuhao/lingluan.words_essence
  # 以下是全碼詞庫
  - yuhao/lingluan_sc.words 
  - yuhao/lingluan_tc.words
  # 以下是低優先級用户自定义詞庫
  - yuhao/yuhao.extended
  # 以下是符號
  - yuhao/yuhao.symbols
  - yuhao/yuhao.symbols_kuai
columns:
  - text
  - code
encoder:
  exclude_patterns:
    - "^[a-z]$"
    - "[^a-z]"
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 20]
      formula: "AaBaCaZa"
...

